<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found - GrowDay</title>
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0a0f1c;
        color: #f1f5f9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      .container {
        max-width: 420px;
      }
      .code {
        font-size: 72px;
        font-weight: 800;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, #22c55e, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
      }
      h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 12px;
        letter-spacing: -0.02em;
      }
      p {
        color: #94a3b8;
        line-height: 1.6;
        font-size: 15px;
        margin-bottom: 32px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        border-radius: 12px;
        background: linear-gradient(135deg, #22c55e, #06b6d4);
        color: #fff;
        text-decoration: none;
        font-size: 15px;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 0 30px rgba(34,197,94,0.25), 0 8px 24px rgba(0,0,0,0.3);
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 40px rgba(34,197,94,0.35), 0 12px 32px rgba(0,0,0,0.4);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <a href="/" class="btn">← Back to Home</a>
    </div>
  </body>
</html>
